name: tellpal-v2

services:
  postgres:
    image: postgres:15
    container_name: tellpal-v2-postgres
    environment:
      POSTGRES_DB: ${TELLPAL_DB_NAME:-tellpal_v2}
      POSTGRES_USER: ${TELLPAL_DB_USERNAME:-tellpal}
      POSTGRES_PASSWORD: ${TELLPAL_DB_PASSWORD:-tellpal}
      TZ: UTC
    ports:
      - "${TELLPAL_DB_PORT:-5432}:5432"
    volumes:
      - tellpal-v2-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TELLPAL_DB_USERNAME:-tellpal} -d ${TELLPAL_DB_NAME:-tellpal_v2}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tellpal-v2-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      TELLPAL_DB_URL: jdbc:postgresql://postgres:5432/${TELLPAL_DB_NAME:-tellpal_v2}
      TELLPAL_DB_NAME: ${TELLPAL_DB_NAME:-tellpal_v2}
      TELLPAL_DB_PORT: 5432
      TELLPAL_DB_USERNAME: ${TELLPAL_DB_USERNAME:-tellpal}
      TELLPAL_DB_PASSWORD: ${TELLPAL_DB_PASSWORD:-tellpal}
      TELLPAL_API_DOCS_ENABLED: "true"
      TELLPAL_ADMIN_JWT_SECRET: change-me-change-me-change-me-32-bytes
      TELLPAL_FIREBASE_STUB_TOKENS_ENABLED: "true"
    ports:
      - "8080:8080"

volumes:
  tellpal-v2-postgres-data:
