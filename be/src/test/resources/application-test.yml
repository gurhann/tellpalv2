spring:
  datasource:
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration

tellpal:
  asset:
    processing:
      poller:
        enabled: false
  security:
    admin:
      jwt-secret: change-me-change-me-change-me-32-bytes
    firebase:
      stub-tokens-enabled: true
