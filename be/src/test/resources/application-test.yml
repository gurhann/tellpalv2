spring:
  datasource:
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration

tellpal:
  asset:
    storage:
      firebase:
        fake-client-enabled: true
        project-id: tellpal-test
        bucket-name: tellpal-test-bucket
        credentials-path: be/var/firebase-test-service-account.json
        path-prefix: test
        signed-upload-ttl: PT15M
        signed-download-ttl: PT15M
    processing:
      poller:
        enabled: false
  security:
    admin:
      jwt-secret: change-me-change-me-change-me-32-bytes
    firebase:
      stub-tokens-enabled: true
