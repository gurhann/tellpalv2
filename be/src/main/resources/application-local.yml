spring:
  config:
    activate:
      on-profile: local
  datasource:
    hikari:
      maximum-pool-size: ${TELLPAL_DB_MAX_POOL_SIZE:10}
      minimum-idle: ${TELLPAL_DB_MIN_IDLE:2}
  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: true

tellpal:
  api-docs:
    enabled: true
  asset:
    storage:
      firebase:
        path-prefix: local
        project-id: tellpal-ee0dd
        bucket-name: tellpal-ee0dd.appspot.com
        credentials-path: C:\dev\keys\tellpal-v2-firebase-storage-pk.json
        signed-upload-ttl: PT15M
        signed-download-ttl: PT1H
  security:
    admin:
      jwt-secret: change-me-change-me-change-me-32-bytes
      cors:
        allowed-origins:
          - http://localhost:5173
          - http://127.0.0.1:5173
          - http://localhost:4173
          - http://127.0.0.1:4173
    firebase:
      stub-tokens-enabled: true