spring:
  config:
    activate:
      on-profile: local
  datasource:
    hikari:
      maximum-pool-size: ${TELLPAL_DB_MAX_POOL_SIZE:10}
      minimum-idle: ${TELLPAL_DB_MIN_IDLE:2}
  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: true

tellpal:
  security:
    firebase:
      stub-tokens-enabled: true
