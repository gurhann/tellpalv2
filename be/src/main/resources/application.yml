spring:
  application:
    name: tellpal-v2-backend
  config:
    import: optional:classpath:application-api-docs.yml
  profiles:
    default: local
  datasource:
    url: ${TELLPAL_DB_URL:jdbc:postgresql://localhost:5432/tellpal_v2}
    username: ${TELLPAL_DB_USERNAME:tellpal}
    password: ${TELLPAL_DB_PASSWORD:tellpal}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,httpexchanges
  endpoint:
    health:
      probes:
        enabled: true
  httpexchanges:
    recording:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%thread] %logger{36} requestId=%X{requestId:-none} %msg%n"

server:
  shutdown: graceful

tellpal:
  api-docs:
    enabled: ${TELLPAL_API_DOCS_ENABLED:false}
    title: ${TELLPAL_API_DOCS_TITLE:TellPal V2 Backend API}
    description: ${TELLPAL_API_DOCS_DESCRIPTION:Internal OpenAPI documentation for admin, mobile, and webhook endpoints.}
    version: ${TELLPAL_API_DOCS_VERSION:v1}
  asset:
    processing:
      poller:
        enabled: ${TELLPAL_ASSET_PROCESSING_POLLER_ENABLED:true}
        fixed-delay-ms: ${TELLPAL_ASSET_PROCESSING_POLLER_DELAY_MS:5000}
        batch-size: ${TELLPAL_ASSET_PROCESSING_POLLER_BATCH_SIZE:10}
  security:
    admin:
      jwt-issuer: ${TELLPAL_ADMIN_JWT_ISSUER:tellpal-v2-admin}
      jwt-secret: ${TELLPAL_ADMIN_JWT_SECRET:}
      access-token-ttl: ${TELLPAL_ADMIN_ACCESS_TOKEN_TTL:PT1H}
      refresh-token-ttl: ${TELLPAL_ADMIN_REFRESH_TOKEN_TTL:P30D}
      bcrypt-strength: ${TELLPAL_ADMIN_BCRYPT_STRENGTH:10}
    firebase:
      stub-tokens-enabled: ${TELLPAL_FIREBASE_STUB_TOKENS_ENABLED:false}
      project-id: ${TELLPAL_FIREBASE_PROJECT_ID:}
      credentials-path: ${TELLPAL_FIREBASE_CREDENTIALS_PATH:}
      check-revoked: ${TELLPAL_FIREBASE_CHECK_REVOKED:false}
  purchase:
    revenuecat:
      authorization-header: ${TELLPAL_REVENUECAT_AUTHORIZATION_HEADER:}
  firebase-migration:
    enabled: ${TELLPAL_FIREBASE_MIGRATION_ENABLED:false}
    dry-run: ${TELLPAL_FIREBASE_MIGRATION_DRY_RUN:true}
    staging-dir: ${TELLPAL_FIREBASE_MIGRATION_STAGING_DIR:be/var/firebase-migration}
    users-file-name: ${TELLPAL_FIREBASE_MIGRATION_USERS_FILE:users.json}
    content-events-file-name: ${TELLPAL_FIREBASE_MIGRATION_CONTENT_EVENTS_FILE:content-events.json}
    app-events-file-name: ${TELLPAL_FIREBASE_MIGRATION_APP_EVENTS_FILE:app-events.json}
    import-users: ${TELLPAL_FIREBASE_MIGRATION_IMPORT_USERS:true}
    import-content-events: ${TELLPAL_FIREBASE_MIGRATION_IMPORT_CONTENT_EVENTS:true}
    import-app-events: ${TELLPAL_FIREBASE_MIGRATION_IMPORT_APP_EVENTS:true}
