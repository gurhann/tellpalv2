spring:
  application:
    name: tellpal-v2-backend

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:tellpal}
    username: ${DB_USER:tellpal}
    password: ${DB_PASSWORD:tellpal}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true
    out-of-order: false

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  firebase:
    credentials-path: ${FIREBASE_CREDENTIALS_PATH:}
    storage-bucket: ${FIREBASE_STORAGE_BUCKET:tellpal-dev.appspot.com}
  jwt:
    secret: ${JWT_SECRET:dev-secret-key-change-in-production-min-32-chars}
    access-token-expiry-hours: 1
    refresh-token-expiry-days: 30

logging:
  level:
    com.tellpal.v2: INFO
    org.springframework.modulith: INFO
    org.flywaydb: INFO
